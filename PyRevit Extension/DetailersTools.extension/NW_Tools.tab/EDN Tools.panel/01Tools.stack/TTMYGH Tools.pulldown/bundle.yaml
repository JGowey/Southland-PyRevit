tooltip: |
  Things That Make You Go Hmm Tools
  Investigation, inspection, and diagnostic tools.

  Element Visibility     -- diagnose why an element is visible or hidden
  Snoop Selection        -- deep property inspector (params, geometry, connectors)
  Find Sheet             -- locate which sheet a view lives on
  Nested Link Scan       -- detect nested Attachment-type links in loaded Revit links
  Check Duct Orientation -- flag fabrication duct where width < depth
  GridManager            -- move grids, control bubble visibility, adjust extents
